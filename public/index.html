<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Proxmox Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ── Header ── -->
  <header class="app-header">
    <div class="header-left">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="3" width="9" height="8" rx="1.5" fill="#e85d2d"/>
          <rect x="13" y="3" width="9" height="8" rx="1.5" fill="#e85d2d" opacity=".6"/>
          <rect x="2" y="13" width="9" height="8" rx="1.5" fill="#e85d2d" opacity=".6"/>
          <rect x="13" y="13" width="9" height="8" rx="1.5" fill="#e85d2d" opacity=".3"/>
        </svg>
      </div>
      <div>
        <h1 class="app-title">Proxmox</h1>
        <span class="app-subtitle" id="cluster-name">Dashboard</span>
      </div>
    </div>
    <div class="header-right">
      <div class="refresh-indicator" id="refresh-indicator" title="Auto-refresh status"></div>
      <button class="icon-btn" id="refresh-btn" title="Refresh now">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Tab Bar ── -->
  <nav class="tab-bar">
    <button class="tab active" data-tab="overview">Overview</button>
    <button class="tab" data-tab="vms">VMs & CTs</button>
    <button class="tab" data-tab="storage">Storage</button>
    <button class="tab" data-tab="tasks">Tasks</button>
  </nav>

  <!-- ── Main Content ── -->
  <main class="content">

    <!-- Overview Tab -->
    <section class="tab-panel active" id="tab-overview">
      <div id="nodes-container">
        <div class="skeleton-loader">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </section>

    <!-- VMs & Containers Tab -->
    <section class="tab-panel" id="tab-vms">
      <div class="filter-bar">
        <input type="search" id="vm-search" placeholder="Search VMs & containers..." class="search-input" />
        <div class="filter-chips">
          <button class="chip active" data-filter="all">All</button>
          <button class="chip" data-filter="running">Running</button>
          <button class="chip" data-filter="stopped">Stopped</button>
          <button class="chip" data-filter="qemu">VMs</button>
          <button class="chip" data-filter="lxc">CTs</button>
        </div>
      </div>
      <div id="vms-container">
        <div class="skeleton-loader">
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
        </div>
      </div>
    </section>

    <!-- Storage Tab -->
    <section class="tab-panel" id="tab-storage">
      <div id="storage-container">
        <div class="skeleton-loader">
          <div class="skeleton-card"></div>
        </div>
      </div>
    </section>

    <!-- Tasks Tab -->
    <section class="tab-panel" id="tab-tasks">
      <div id="tasks-container">
        <div class="skeleton-loader">
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
          <div class="skeleton-row"></div>
        </div>
      </div>
    </section>

  </main>

  <!-- ── Settings Modal ── -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Settings</h2>
        <button class="icon-btn" id="close-settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <label class="setting-row">
          <span>Refresh interval</span>
          <select id="setting-interval">
            <option value="5">5 seconds</option>
            <option value="10" selected>10 seconds</option>
            <option value="30">30 seconds</option>
            <option value="60">1 minute</option>
          </select>
        </label>
        <label class="setting-row">
          <span>Show offline VMs</span>
          <input type="checkbox" id="setting-show-offline" checked class="toggle" />
        </label>
        <label class="setting-row">
          <span>Compact view</span>
          <input type="checkbox" id="setting-compact" class="toggle" />
        </label>
        <div class="setting-row">
          <span>Last updated</span>
          <span id="last-updated" class="muted">—</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Action Confirm Modal ── -->
  <div class="modal-overlay" id="action-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="action-modal-title">Confirm Action</h2>
      </div>
      <div class="modal-body">
        <p id="action-modal-body"></p>
        <div class="action-btns">
          <button class="btn btn-ghost" id="action-cancel">Cancel</button>
          <button class="btn btn-danger" id="action-confirm">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Toast ── -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>

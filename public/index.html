<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0b0d12" />
  <title>PVE Vitals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">

    <header class="topbar">
      <div class="brand">
        <svg class="brand-logo" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
          <path d="M2 20 L7 20 L10 10 L14 24 L18 14 L22 20 L30 20"
                fill="none" stroke="#e85d2d" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>
        <div class="brand-text">
          <div class="brand-name">PVE Vitals</div>
          <div class="brand-cluster" id="cluster-name" data-i18n="cluster">Cluster</div>
        </div>
      </div>

      <div class="health" id="health" role="status">
        <div class="health-dot"></div>
        <div class="health-text" data-i18n="healthChecking">Checking</div>
      </div>

      <div class="meta">
        <div class="meta-clock" id="clock">--:--</div>
        <div class="meta-updated" id="last-updated" data-i18n="waitingForData">Waiting for data</div>
      </div>
    </header>

    <div class="cluster-summary" id="cluster-summary" hidden></div>

    <div class="alerts" id="alerts" role="log" aria-live="polite" aria-atomic="false" hidden></div>

    <div class="backup-strip" id="backup-strip" hidden></div>

    <main class="grid">
      <section class="panel panel-nodes">
        <h2 class="panel-title">
          <span data-i18n="nodes">Nodes</span>
          <span class="panel-count" id="nodes-count"></span>
        </h2>
        <div class="panel-body" id="nodes-body">
          <div class="placeholder" data-i18n="loading">Loading</div>
        </div>
      </section>

      <section class="panel panel-vms">
        <h2 class="panel-title">
          <span data-i18n="guests">VMs &amp; CTs</span>
          <span class="panel-count" id="vms-count"></span>
        </h2>
        <div class="panel-body" id="vms-body">
          <div class="placeholder" data-i18n="loading">Loading</div>
        </div>
      </section>

      <section class="panel panel-storage">
        <h2 class="panel-title">
          <span data-i18n="storage">Storage</span>
          <span class="panel-count" id="storage-count"></span>
        </h2>
        <div class="panel-body" id="storage-body">
          <div class="placeholder" data-i18n="loading">Loading</div>
        </div>
      </section>

      <section class="panel panel-tasks">
        <h2 class="panel-title">
          <span data-i18n="tasks">Recent tasks</span>
          <span class="panel-count" id="tasks-count"></span>
        </h2>
        <div class="panel-body" id="tasks-body">
          <div class="placeholder" data-i18n="loading">Loading</div>
        </div>
      </section>
    </main>

  </div>

  <div class="attribution" id="attribution" aria-hidden="true">by Mia Grünwald</div>

  <script src="app.js"></script>
</body>
</html>
